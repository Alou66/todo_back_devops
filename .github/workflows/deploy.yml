name: Backend CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push l'image backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend:latest

      - name: Déployer sur le Back via le bastion Front
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          FRONT_HOST: ${{ secrets.FRONT_HOST }}
          BACK_HOST: ${{ secrets.BACK_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend:latest
          AWS_ACCESS_KEY_ID: ${{ secrets.CI_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CI_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-3
          FRONT_SG_ID: sg-0b1530406008e8eb0
        run: |
          # Le SG du Front n'autorise en permanence le SSH que depuis l'IP
          # admin (voir infra/terraform). Les runners GitHub Actions ont une
          # IP différente à chaque run : on l'ajoute temporairement le temps
          # du déploiement, puis on la retire (trap = même en cas d'échec).
          RUNNER_IP=$(curl -s https://api.ipify.org)
          aws ec2 authorize-security-group-ingress \
            --group-id "$FRONT_SG_ID" --protocol tcp --port 22 --cidr "${RUNNER_IP}/32"
          trap 'aws ec2 revoke-security-group-ingress --group-id "$FRONT_SG_ID" --protocol tcp --port 22 --cidr "${RUNNER_IP}/32" || true' EXIT

          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config <<CONFIG
          Host front
            HostName $FRONT_HOST
            User ubuntu
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
          Host back
            HostName $BACK_HOST
            User ubuntu
            IdentityFile ~/.ssh/deploy_key
            ProxyJump front
            StrictHostKeyChecking accept-new
          CONFIG
          chmod 600 ~/.ssh/config

          ssh back "IMAGE='$IMAGE' DATABASE_URL='$DATABASE_URL' CORS_ORIGIN='$CORS_ORIGIN' bash -s" <<'SCRIPT'
            set -e
            CONTAINER=app_back
            PREV_IMAGE=$(docker inspect --format '{{.Config.Image}}' "$CONTAINER" 2>/dev/null || true)

            docker pull "$IMAGE"
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true
            docker run -d --name "$CONTAINER" --restart unless-stopped \
              -e DATABASE_URL="$DATABASE_URL" -e PORT=3001 -e CORS_ORIGIN="$CORS_ORIGIN" \
              -p 3001:3001 "$IMAGE"

            sleep 5
            if ! curl -fs http://localhost:3001/api/health >/dev/null; then
              echo "Health check KO, rollback vers $PREV_IMAGE"
              docker stop "$CONTAINER" 2>/dev/null || true
              docker rm "$CONTAINER" 2>/dev/null || true
              if [ -n "$PREV_IMAGE" ]; then
                docker run -d --name "$CONTAINER" --restart unless-stopped \
                  -e DATABASE_URL="$DATABASE_URL" -e PORT=3001 -e CORS_ORIGIN="$CORS_ORIGIN" \
                  -p 3001:3001 "$PREV_IMAGE"
              fi
              exit 1
            fi
            echo "Déploiement backend OK"
          SCRIPT
